<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart 11 - Predict & Win</title>
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"Smart 11","short_name":"Smart11","start_url":".","display":"standalone","background_color":"#0f172a","theme_color":"#3b82f6","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/5312/5312435.png","sizes":"512x512","type":"image/png"}]}'>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --text: #f8fafc; --muted: #94a3b8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 480px; min-height: 100vh; background: var(--bg); position: relative; padding-bottom: 80px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .active-screen { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        input { width: 100%; padding: 12px; margin-bottom: 12px; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; text-transform: uppercase; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: black; }
        .btn-danger { background: var(--danger); color: white; }

        .wallet-card { background: linear-gradient(135deg, #1e3a8a, #3b82f6); padding: 25px 20px; border-radius: 20px; text-align: center; margin-bottom: 25px; }
        .live-q-card { background: var(--card); border: 2px solid var(--warning); border-radius: 15px; padding: 15px; margin-bottom: 20px; position: relative; }
        .live-tag { position: absolute; top: 10px; right: 10px; background: red; font-size: 10px; padding: 2px 8px; border-radius: 4px; animation: blink 1s infinite; color: white; }
        @keyframes blink { 50% { opacity: 0; } }

        .progress-box { margin-top: 10px; background: #0f172a; height: 8px; border-radius: 10px; overflow: hidden; }
        .progress-fill { background: var(--success); height: 100%; width: 0%; transition: width 1s; }

        .nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { text-align: center; color: var(--muted); font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        
        #pwa-install-btn { display: none; background: var(--warning); color: black; padding: 10px; text-align: center; font-weight: bold; cursor: pointer; border-radius: 8px; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-login" class="screen active-screen">
        <div style="text-align:center; margin-top:40px;">
            <i class="fas fa-bolt" style="font-size:50px; color:var(--warning);"></i>
            <h1 style="color:var(--primary); margin-bottom:5px;">Smart 11</h1>
            <p style="color:var(--muted); margin-top:0;">Predict & Win Real Cash</p>
        </div>
        <input type="email" id="logEmail" placeholder="Email Address">
        <input type="password" id="logPass" placeholder="Password">
        <button class="btn btn-primary" onclick="handleAuth()">Login / Sign Up</button>
        <div id="pwa-install-btn" onclick="installApp()">📲 INSTALL APP FOR BETTER EXPERIENCE</div>
        <p id="authMsg" style="text-align:center; color:var(--danger); font-size:12px;"></p>
    </div>

    <div id="scr-home" class="screen">
        <div class="wallet-card">
            <h3 style="margin:0; font-size:12px; color:#bfdbfe;">TOTAL BALANCE</h3>
            <h1 id="wallBal" style="margin:10px 0; font-size:36px;">₹0</h1>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="btn btn-warning" style="margin:0; width:120px; font-size:12px;" onclick="switchScreen('scr-pay')">Add Cash</button>
                <button class="btn" style="margin:0; width:120px; font-size:12px; background:rgba(255,255,255,0.2);" onclick="switchScreen('scr-withdraw')">Withdraw</button>
            </div>
        </div>

        <div id="live-question-area"></div>

        <h3>🏆 Mega Match Pool</h3>
        <div style="background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b>Prediction Pool</b>
                <span id="poolEntryDisplay" style="color:var(--success); font-weight:bold; font-size:18px;">₹50</span>
            </div>
            <div class="progress-box"><div id="megaBar" class="progress-fill"></div></div>
            <p id="megaStats" style="font-size:11px; margin-top:5px; color:var(--muted);"></p>
            <button class="btn btn-success" style="margin-top:10px;" onclick="joinPool()">Join Now</button>
        </div>
    </div>

    <div id="scr-withdraw" class="screen">
        <h3>Request Withdrawal</h3>
        <input type="number" id="wAmt" placeholder="Amount (Min ₹100)">
        <input type="text" id="wUpi" placeholder="Your UPI ID">
        <button class="btn btn-danger" onclick="reqWithdraw()">Send Request</button>
        <button class="btn btn-primary" onclick="switchScreen('scr-home')">Back</button>
    </div>

    <div id="scr-pay" class="screen">
        <h3>Add Cash to Wallet</h3>
        <img id="qrImg" src="" style="width:200px; display:block; margin:auto; border:4px solid white; border-radius:10px;">
        <p style="text-align:center; font-weight:bold;">UPI: rishabhsisodiya1998@ybl</p>
        <input type="number" id="pAmt" placeholder="Paid Amount">
        <input type="text" id="pUtr" placeholder="UTR / Ref Number">
        <button class="btn btn-success" onclick="subUtr()">Submit to Admin</button>
        <button class="btn btn-primary" onclick="switchScreen('scr-home')">Back</button>
    </div>

    <div class="nav" id="botNav" style="display:none;">
        <div class="nav-item active" onclick="switchScreen('scr-home')"><i class="fa fa-home"></i><br>Home</div>
        <div class="nav-item" onclick="alert('Join Telegram for Updates!')"><i class="fa fa-paper-plane"></i><br>Telegram</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc, onSnapshot, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBfSfeiOmyBSyYBTV87OKH6IqFU0YXemw0",
        authDomain: "ayur-620e7.firebaseapp.com",
        projectId: "ayur-620e7",
        storageBucket: "ayur-620e7.firebasestorage.app",
        messagingSenderId: "732502202884",
        appId: "1:732502202884:web:3863c7d829b54d79743351"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let uId = null; let uBal = 0; let currentPoolFee = 50;

    // INSTALL APP LOGIC
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('pwa-install-btn').style.display = 'block';
    });
    window.installApp = async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt = null;
        }
    };

    window.switchScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    };

    window.handleAuth = async () => {
        const e = document.getElementById('logEmail').value;
        const p = document.getElementById('logPass').value;
        try { await signInWithEmailAndPassword(auth, e, p); }
        catch (err) { 
            if(err.code === 'auth/user-not-found') await createUserWithEmailAndPassword(auth, e, p); 
            else alert("Invalid Details!"); 
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            uId = user.uid;
            const uRef = doc(db, "users", uId);
            onSnapshot(uRef, (snap) => {
                if(snap.exists()) {
                    uBal = snap.data().walletBalance;
                    document.getElementById('wallBal').innerText = "₹" + uBal;
                } else {
                    setDoc(uRef, { walletBalance: 50, email: user.email });
                }
            });
            document.getElementById('botNav').style.display = 'flex';
            switchScreen('scr-home'); listenPool(); listenGame();
        }
    });

    function listenPool() {
        onSnapshot(doc(db, "settings", "pool_config"), (snap) => {
            if(snap.exists()) {
                currentPoolFee = snap.data().entryFee;
                document.getElementById('poolEntryDisplay').innerText = `₹${currentPoolFee}`;
            }
        });
        onSnapshot(collection(db, "pool_entries"), (snap) => {
            let total = 68 + snap.size; // Dummy base
            document.getElementById('megaBar').style.width = (total > 100 ? 100 : total) + "%";
            document.getElementById('megaStats').innerText = `🔥 ${total} Experts Joined`;
        });
    }

    window.joinPool = async () => {
        if(uBal < currentPoolFee) return alert("Walet balance low!");
        await updateDoc(doc(db, "users", uId), { walletBalance: uBal - currentPoolFee });
        await addDoc(collection(db, "pool_entries"), { uid: uId, time: serverTimestamp() });
        alert("Pool Joined!");
    };

    function listenGame() {
        onSnapshot(doc(db, "live_game", "current"), (snap) => {
            const area = document.getElementById('live-question-area');
            if(snap.exists()) {
                const d = snap.data();
                area.innerHTML = `<div class="live-q-card"><span class="live-tag">LIVE</span><h3>${d.question}</h3><div style="display:flex;gap:10px;"><button class="btn btn-primary" onclick="ans('YES')">YES</button><button class="btn btn-danger" onclick="ans('NO')">NO</button></div></div>`;
            } else { area.innerHTML = ""; }
        });
    }

    window.ans = async (choice) => {
        await addDoc(collection(db, "live_entries"), { uid: uId, choice: choice });
        alert("Submitted!");
    };

    window.subUtr = async () => {
        await addDoc(collection(db, "requests"), { uid: uId, amt: parseInt(document.getElementById('pAmt').value), utr: document.getElementById('pUtr').value, type: "ADD", status: "Pending" });
        alert("Sent to Admin!");
    };

    window.reqWithdraw = async () => {
        const amt = parseInt(document.getElementById('wAmt').value);
        if(uBal < amt) return alert("Low balance!");
        await updateDoc(doc(db, "users", uId), { walletBalance: uBal - amt });
        await addDoc(collection(db, "requests"), { uid: uId, amt: amt, upi: document.getElementById('wUpi').value, type: "WITH", status: "Pending" });
        alert("Requested!");
    };

    document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=rishabhsisodiya1998@ybl&pn=Smart11`;
</script>
</body>
</html>
